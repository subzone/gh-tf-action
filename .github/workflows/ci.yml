name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Lint & unit tests ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install ruff

      - name: Ruff lint
        run: ruff check src/

  # ── Build Docker image ────────────────────────────────────────────────────────
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gh-tf-action:ci .

  # ── Integration test — plan against null-provider infra ───────────────────────
  test-plan:
    name: Test — plan (null provider)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      pull-requests: write      # for PR comments
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Terraform plan
        uses: ./
        with:
          command:             plan
          terraform-version:   '1.12.0'
          working-directory:   infra
          backend-type:        local
          post-pr-comment:     ${{ github.event_name == 'pull_request' }}
          post-step-summary:   true
          upload-plan-artifact: true
          artifact-name:       terraform-plan-ci

      - name: Upload plan artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-ci
          path: infra/plan.json
          if-no-files-found: ignore

  # ── Integration test — plan-and-apply ─────────────────────────────────────────
  test-apply:
    name: Test — plan-and-apply (null provider)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Terraform plan-and-apply
        uses: ./
        with:
          command:           plan-and-apply
          terraform-version: '1.12.0'
          working-directory: infra
          backend-type:      local
          auto-approve:      true
          post-step-summary: true
          post-pr-comment:   false
          upload-plan-artifact: false

  # ── Visualization — AWS fixture (policy checks + Mermaid graph) ───────────────
  test-visualize-aws:
    name: Test — visualize AWS plan (fixture)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Visualize AWS plan
        uses: ./
        with:
          plan-json-path:    fixture/aws-plan.json
          post-step-summary: true
          post-pr-comment:   ${{ github.event_name == 'pull_request' }}
          upload-plan-artifact: false

  # ── Visualization — Azure fixture (policy checks + Mermaid graph) ─────────────
  test-visualize-azure:
    name: Test — visualize Azure plan (fixture)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Visualize Azure plan
        uses: ./
        with:
          plan-json-path:    fixture/azure-plan.json
          post-step-summary: true
          post-pr-comment:   ${{ github.event_name == 'pull_request' }}
          upload-plan-artifact: false
